<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Operaciones con JavaScript</title>
</head>
<body>

    <h1>Operaciones básicas</h1>

    <p id="resultado"></p>

    <script>
        // Declarar variables
        var num1 = 10;
        var num2 = 5;

        // Operaciones
        var suma = num1 + num2;
        var resta = num1 - num2;
        var division = num1 / num2;
        var exponente = num1 ** num2;

        // Mostrar resultados
        document.getElementById("resultado").innerHTML =
            "Suma: " + suma + "<br>" +
            "Resta: " + resta + "<br>" +
            "División: " + division + "<br>" +
            "Exponente: " + exponente;
    </script>

</body>
</html>
